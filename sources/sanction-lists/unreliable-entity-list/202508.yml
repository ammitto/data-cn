# yaml-language-server: $schema=../../../schemas/cn-announcement.yml
---
announcement:
  title:
  - zh-Hans: 不可靠实体清单工作机制关于将护盾人工智能公司等6家美国企业列入不可靠实体清单的公告
    en: Announcement on Adding Shield AI, Inc. and Five Other U.S. Companies to the Unreliable Entity List
  url: https://www.mofcom.gov.cn/zwgk/zcfb/art/2025/art_c29bed8111a5406ea44f363694865ac2.html
  lang: zh-Hans
  publish_date: '2025-04-09'
  publish_time: "19:00"
  authority: cn/unreliable-entity-list-working-mechanism
  publisher: cn/ministry-of-commerce-industry-security-and-import-export-control
  type: cn/unreliable-entity-list-working-mechanism-announcement
  document_id: 〔2025〕8号
  signatory: cn/unreliable-entity-list-working-mechanism
  content: |
    为维护国家主权、安全和发展利益，根据《中华人民共和国对外贸易法》《中华人民共和国国家安全法》《中华人民共和国反外国制裁法》等有关法律，不可靠实体清单工作机制依据《不可靠实体清单规定》第二条、第八条和第十条等有关规定，决定将护盾人工智能公司（Shield AI,Inc.）、内华达山脉公司（Sierra Nevada Corporation）、赛博勒克斯公司（Cyberlux Corporation）、边缘自治运营公司（Edge Autonomy Operations LLC）、Group W公司（Group W）和哈德森技术公司（Hudson Technologies Co.）等6家实体列入不可靠实体清单，并采取以下处理措施：

    一、禁止上述企业从事与中国有关的进出口活动；
    二、禁止上述企业在中国境内新增投资。

    本公告未尽事宜，按《不可靠实体清单规定》执行。
    本公告自2025年4月10日12时01分起实施。

