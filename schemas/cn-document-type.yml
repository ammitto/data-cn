# JSON Schema for China Document Types
# For IDE yaml-language-server support, keep the comment reference above
---
title: China Document Types
description: Schema for validating Chinese document type taxonomy files
type: object
required:
  - document_types
properties:
  document_types:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          pattern: "^[a-z0-9-/]+$"
          description: Unique identifier for the document type (e.g., "cn/ministry-of-commerce-order")
        name:
          type: object
          minProperties: 1
          properties:
            zh-Hans:
              type: string
              description: Chinese name (Simplified)
            en:
              type: string
              description: English name
          additionalProperties: false
      additionalProperties: false
additionalProperties: false
